name: Release Desktop App

# Push a version tag (e.g. v0.3.0) to build, sign, and publish a new desktop
# release. Installed apps (v0.2.0+) check GitHub Releases on launch and prompt
# users to auto-update. See docs/AUTO_UPDATE.md.
on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        run: npm ci

      - uses: dtolnay/rust-toolchain@stable

      # Caches Rust deps between runs so subsequent releases build fast.
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Build, sign and publish the release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Set these two in the repo: Settings → Secrets and variables → Actions.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'CCA Staff Biodata ${{ github.ref_name }}'
          releaseBody: 'Automatic update. Installed apps will prompt to update on next launch.'
          releaseDraft: false
          prerelease: false
