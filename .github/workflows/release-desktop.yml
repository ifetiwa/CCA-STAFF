name: Release Desktop App

# Push a version tag (e.g. v0.3.0) to build, sign, and publish a new desktop
# release. Installed apps (v0.2.0+) check GitHub Releases on launch and prompt
# users to auto-update. See docs/AUTO_UPDATE.md.
on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          # Match the npm major (11.x / Node 24) that generated package-lock.json
          # so `npm ci`'s strict lock check stays reproducible across machines.
          node-version: 24

      - name: Install frontend dependencies
        # Use `npm install`, not `npm ci`: the lockfile picks up cross-platform
        # optional-dependency drift (vite/rolldown native bindings pull
        # @emnapi/core + @emnapi/runtime, whose resolved patch version differs
        # between the dev machine and the CI runner). `npm ci`'s strict lock
        # check hard-fails on that drift; `npm install` reconciles it. The
        # committed lock still pins versions for day-to-day reproducibility.
        run: npm install --no-audit --no-fund

      - uses: dtolnay/rust-toolchain@stable

      # Caches Rust deps between runs so subsequent releases build fast.
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # Fail fast with a clear message if the signing key is missing. The
      # updater config in tauri.conf.json carries a public key, so every
      # release MUST be signed with the matching private key — otherwise the
      # build errors deep inside the bundler with a confusing message.
      - name: Verify signing secrets are present
        shell: bash
        env:
          KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if [ -z "$KEY" ]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY is empty. Add it (and TAURI_SIGNING_PRIVATE_KEY_PASSWORD) under Settings → Secrets and variables → Actions. It must be the private key matching the pubkey in src-tauri/tauri.conf.json."
            exit 1
          fi
          echo "Signing key present ($(printf %s "$KEY" | wc -c) bytes)."

      # Use RELEASE_NOTES.md (if present) as the release body so users see real
      # notes both on GitHub and in the in-app update prompt.
      - name: Read release notes
        id: notes
        shell: bash
        run: |
          if [ -f RELEASE_NOTES.md ]; then
            { echo "body<<__EOF__"; cat RELEASE_NOTES.md; echo "__EOF__"; } >> "$GITHUB_OUTPUT"
          else
            echo "body=Automatic update. Installed apps will prompt to update on next launch." >> "$GITHUB_OUTPUT"
          fi

      - name: Build, sign and publish the release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Set these two in the repo: Settings → Secrets and variables → Actions.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'CCA Staff Biodata ${{ github.ref_name }}'
          releaseBody: ${{ steps.notes.outputs.body }}
          releaseDraft: false
          prerelease: false
