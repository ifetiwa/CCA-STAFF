# Nginx vhost for the CCA Biodata Management System.
#
# Install at /etc/nginx/sites-available/biodata, symlink into sites-enabled,
# then `sudo nginx -t && sudo systemctl reload nginx`.
#
# All client requests hit Nginx first.  Static + media files are served off
# disk; everything else proxies to Gunicorn over a UNIX socket.  Access is
# restricted to the court LAN by the allow/deny block — edit those CIDRs to
# match your environment.

upstream biodata_app {
    server unix:/run/gunicorn/biodata.sock fail_timeout=0;
}

# --- HTTP → HTTPS redirect ---------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name biodata.cca.local;

    # Allow http-01 challenges if you later switch to an internal CA that
    # supports them.  Everything else gets bounced to HTTPS.
    location /.well-known/acme-challenge/ {
        root /var/www/_acme;
        default_type "text/plain";
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- HTTPS vhost -------------------------------------------------------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name biodata.cca.local;

    # ---- TLS ----
    ssl_certificate     /etc/ssl/biodata/biodata.cca.local.crt;
    ssl_certificate_key /etc/ssl/biodata/biodata.cca.local.key;
    ssl_dhparam         /etc/ssl/biodata/dhparam.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # ---- Court-network access control --------------------------------------
    # Anything not in these CIDRs is refused at the front door.  Mirror this
    # list with the UFW rules from 05_firewall.sh.
    allow 192.168.0.0/16;
    allow 10.0.0.0/8;
    allow 127.0.0.1;
    deny  all;

    # ---- Hardening headers -------------------------------------------------
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Large enough for bulk staff CSV uploads.  Keep ≤ DATA_UPLOAD_MAX_MEMORY_SIZE
    # in Django settings (default 10 MB).
    client_max_body_size 12m;
    client_body_timeout 60s;
    send_timeout        60s;

    # ---- Static files (collectstatic output) -------------------------------
    location /static/ {
        alias /opt/biodata/backend/staticfiles/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ---- Media uploads (passport photos, etc.) -----------------------------
    # No "immutable" because users replace photos in place.
    location /media/ {
        alias /opt/biodata/backend/media/;
        access_log off;
        expires 7d;
    }

    # ---- App ---------------------------------------------------------------
    location / {
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_redirect off;
        proxy_pass http://biodata_app;
        proxy_read_timeout 60s;
    }

    access_log /var/log/nginx/biodata.access.log;
    error_log  /var/log/nginx/biodata.error.log warn;
}
