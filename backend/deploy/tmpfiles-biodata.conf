# /etc/tmpfiles.d/biodata.conf
# Recreate the Gunicorn socket dir on boot — /run is tmpfs and wiped on
# every reboot. Install with:
#
#     sudo cp deploy/tmpfiles-biodata.conf /etc/tmpfiles.d/biodata.conf
#     sudo systemd-tmpfiles --create /etc/tmpfiles.d/biodata.conf
#
d /run/gunicorn 0775 biodata www-data -
