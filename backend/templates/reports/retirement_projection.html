{% extends "reports/_base.html" %}

{% block filters %}
<div class="row g-2 align-items-end">
  <div class="col-md-3">
    <label class="form-label small mb-1">Horizon</label>
    <select name="horizon" class="form-select">
      <option value="1" {% if horizon == 1 %}selected{% endif %}>Next 1 year</option>
      <option value="2" {% if horizon == 2 %}selected{% endif %}>Next 2 years</option>
      <option value="5" {% if horizon == 5 %}selected{% endif %}>Next 5 years</option>
    </select>
  </div>
  {% include "reports/_common_filters.html" %}
</div>
{% endblock %}

{% block preview %}
  {% include "reports/_flat_preview.html" %}
{% endblock %}
