services:
  - type: web
    name: cca-staff-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: ./build.sh
    startCommand: gunicorn biodata_system.wsgi:application --workers 2 --threads 4 --timeout 60
    healthCheckPath: /health/
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.6
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        sync: false   # set to: cca-staff-backend.onrender.com,<your-custom-domain>
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        sync: false   # set to: https://cca-staff-backend.onrender.com,https://<your-vercel-domain>.vercel.app
      - key: CORS_ALLOWED_ORIGINS
        sync: false   # set to: https://<your-vercel-domain>.vercel.app
      - key: DATABASE_URL
        sync: false   # paste Neon connection string (include ?sslmode=require)
      - key: CLOUDINARY_URL
        sync: false   # paste from Cloudinary dashboard, format: cloudinary://<key>:<secret>@<cloud-name>
      - key: SECURE_SSL_REDIRECT
        value: "True"
      - key: DJANGO_LOG_LEVEL
        value: INFO
      # ─ Optional super-admin seed (no shell required on free plan). Set
      # ─ SEED_ADMIN_PASSWORD in the Render dashboard to provision/reset
      # ─ the account on the next deploy. Unset it afterwards so subsequent
      # ─ deploys don't keep resetting the password.
      - key: SEED_ADMIN_USERNAME
        value: demo_admin
      - key: SEED_ADMIN_EMAIL
        value: demo@cca.gov.ng
      - key: SEED_ADMIN_PASSWORD
        sync: false   # set to: a strong password (≥10 chars, 1 upper, 1 digit, 1 symbol)
