services:
  - type: web
    name: cca-staff-backend
    runtime: python
    # Keep this in sync with the dashboard. Left at "free" this Blueprint can
    # revert a manual Starter upgrade on the next deploy.
    plan: starter
    rootDir: backend
    buildCommand: ./build.sh
    # Tuning notes:
    #  --threads 8: more per-worker headroom so /health/ and light requests can
    #    still be served while a few threads are blocked on a slow DB query
    #    (e.g. a Neon cold-start) instead of the whole service 502-ing.
    #  --graceful-timeout 30: recycle a stuck worker sooner after --timeout.
    #  --max-requests: periodically recycle workers to shed any slow leak; the
    #    jitter staggers the two workers so they don't recycle in lockstep.
    startCommand: gunicorn biodata_system.wsgi:application --workers 2 --threads 8 --timeout 60 --graceful-timeout 30 --max-requests 1200 --max-requests-jitter 200
    healthCheckPath: /health/
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.6
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        sync: false   # set to: cca-staff-backend.onrender.com,<your-custom-domain>
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        sync: false   # set to: https://cca-staff-backend.onrender.com,https://<your-vercel-domain>.vercel.app
      - key: CORS_ALLOWED_ORIGINS
        sync: false   # set to: https://<your-vercel-domain>.vercel.app
      - key: DATABASE_URL
        sync: false   # paste Neon connection string (include ?sslmode=require)
      - key: CLOUDINARY_URL
        sync: false   # paste from Cloudinary dashboard, format: cloudinary://<key>:<secret>@<cloud-name>
      - key: SECURE_SSL_REDIRECT
        value: "True"
      - key: DJANGO_LOG_LEVEL
        value: INFO
      # ─ Optional super-admin seed (no shell required on free plan). Set
      # ─ SEED_ADMIN_PASSWORD in the Render dashboard to provision/reset
      # ─ the account on the next deploy. Unset it afterwards so subsequent
      # ─ deploys don't keep resetting the password.
      - key: SEED_ADMIN_USERNAME
        value: demo_admin
      - key: SEED_ADMIN_EMAIL
        value: demo@cca.gov.ng
      - key: SEED_ADMIN_PASSWORD
        sync: false   # set to: a strong password (≥10 chars, 1 upper, 1 digit, 1 symbol)
      # Set to "1" once to seed the 8 demo staff rows on the next deploy.
      # Safe to leave at "1" — the seeder is idempotent (keyed by staff_id).
      - key: SEED_DEMO_STAFF
        value: "0"
      # Shared secret for the /api/cron/* endpoints. Daily GitHub Actions
      # workflow (.github/workflows/step-increments.yml) sends this value
      # in the X-Cron-Secret header. Generate once and paste the same
      # value into the GitHub repo secret CRON_SHARED_SECRET.
      - key: CRON_SHARED_SECRET
        sync: false   # set to: a long random string (e.g. `openssl rand -hex 32`)
